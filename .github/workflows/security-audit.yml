#*********************************************************************/
#  Security Pipeline - Native Engine SAST Analysis                   */
#                                                                    */
#  Purpose   : Performs CodeQL semantic analysis specifically for    */
#              the C++17 NanoURL core engine.                        */
#                                                                    */
#  Notes     : - Uses Manual Build mode to hook into CMake.          */
#              - Monitors for memory safety and buffer overflows.    */
#                                                                    */
#  Revision History:                                                 */
#  ------------------------------------------------------------------ */
#  Version    Date        Author          Description                */
#  ------------------------------------------------------------------ */
#  1.0        2026-04-26  Nitish Singh    Scoped to Native C++ only  */
#*********************************************************************/

name: "Security Audit - Native"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 23 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-cpp:
    name: CodeQL Native Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 120 # Reduced timeout as we are only scanning one language
    permissions:
      security-events: write
      packages: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Initialize CodeQL Engine
        uses: github/codeql-action/init@v4
        with:
          languages: 'c-cpp'
          build-mode: 'manual'
          queries: security-extended,security-and-quality

      - name: Run Manual Build
        shell: bash
        run: |
          echo "Compiling Native Core for CodeQL instrumentation..."
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DAPPLE=OFF
          cmake --build build --config Release --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"