#*********************************************************************/
#  CI Pipeline - NanoURL Cross-Platform Native Engine                */
#                                                                    */
#  Purpose   : Orchestrates a multi-OS build and test matrix for     */
#              the NanoURL C++17 core engine.                        */
#  Trigger   : Push to main / Pull Request to main                   */
#  Runtime   : Matrix Build (Ubuntu, Windows, macOS)                 */
#                                                                    */
#  Notes     : - Uses platform-specific cleanup and config logic.    */
#              - Enforces Release configuration for performance.     */
#              - Artifacts include shared libraries for .NET Interop.*/
#                                                                    */
#  Revision History:                                                 */
#  ------------------------------------------------------------------ */
#  Version    Date        Author          Description                */
#  ------------------------------------------------------------------ */
#  1.0        2026-04-26  Nitish Singh    Initial Native CI Matrix   */
#*********************************************************************/

name: NanoURL CLI Build - All OS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      # ======================================================
      # 1. SETUP
      # ======================================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            brew install cmake
          elif [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y cmake build-essential
          fi

      # ======================================================
      # 2. CONFIGURE & BUILD (Static Linking)
      # ======================================================
      - name: Configure and Build
        shell: bash
        run: |
          # Use -DAPPLE=OFF for Non-Mac to avoid M2 flag errors on Ubuntu/Windows
          if [ "${{ runner.os }}" == "macOS" ]; then
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          else
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DAPPLE=OFF
          fi
          cmake --build build --config Release --parallel

      # ======================================================
      # 3. RUN STANDALONE DIAGNOSTICS
      # ======================================================
      - name: Run Diagnostics
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            # Windows might place the exe in /bin or /bin/Release depending on Generator
            if [ -f "./build/bin/Release/NanoURL_CLI.exe" ]; then
              ./build/bin/Release/NanoURL_CLI.exe
            else
              ./build/bin/NanoURL_CLI.exe
            fi
          else
            chmod +x ./build/bin/NanoURL_CLI
            ./build/bin/NanoURL_CLI
          fi

      # ======================================================
      # 4. ARTIFACT PRESERVATION
      # ======================================================
      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoURL-CLI-${{ matrix.os }}
          path: |
            build/bin/NanoURL_CLI
            build/bin/NanoURL_CLI.exe
            build/bin/Release/NanoURL_CLI.exe
          if-no-files-found: error