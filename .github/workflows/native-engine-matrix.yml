#*********************************************************************/
#  CI Pipeline - NanoURL Cross-Platform Native Engine                */
#                                                                    */
#  Purpose   : Orchestrates a multi-OS build and test matrix for     */
#              the NanoURL C++17 core engine.                        */
#  Trigger   : Push to main / Pull Request to main                   */
#  Runtime   : Matrix Build (Ubuntu, Windows, macOS)                 */
#                                                                    */
#  Notes     : - Uses platform-specific cleanup and config logic.    */
#              - Enforces Release configuration for performance.     */
#              - Artifacts include shared libraries for .NET Interop.*/
#                                                                    */
#  Revision History:                                                 */
#  ------------------------------------------------------------------ */
#  Version    Date        Author          Description                */
#  ------------------------------------------------------------------ */
#  1.0        2026-04-26  Nitish Singh    Initial Native CI Matrix   */
#*********************************************************************/

name: NanoURL Native Engine - Multi-OS Matrix

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    env:
      BUILD_DIR: build
      # Standardizing bin path for artifact collection
      BIN_OUTPUT: build/bin

    steps:
      # ======================================================
      # 1. ENVIRONMENT INITIALIZATION
      # ======================================================
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler and CMake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja --yes

      # ======================================================
      # 2. WORKSPACE CLEANUP
      # ======================================================

      - name: Clean build directory (Non-Windows)
        if: runner.os != 'Windows'
        run: rm -rf ${{ env.BUILD_DIR }}

      - name: Clean build directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.BUILD_DIR }}"
          }

      # ======================================================
      # 3. BUILD ORCHESTRATION
      # ======================================================

      - name: Configure (Non-Windows)
        if: runner.os != 'Windows'
        run: cmake -B ${{ env.BUILD_DIR }} -S . -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B ${{ env.BUILD_DIR }} -S . -G "Visual Studio 17 2022" -A x64

      - name: Build Project (All Platforms)
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --parallel

      # ======================================================
      # 4. NATIVE DIAGNOSTIC EXECUTION
      # ======================================================

      - name: Run Diagnostics (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./${{ env.BIN_OUTPUT }}/NanoURL_CLI
          ./${{ env.BIN_OUTPUT }}/NanoURL_CLI

      - name: Run Diagnostics (Windows)
        if: runner.os == 'Windows'
        run: ./${{ env.BIN_OUTPUT }}/Release/NanoURL_CLI.exe

      # ======================================================
      # 5. POST-EXECUTION ARTIFACTS
      # ======================================================

      - name: Upload Native Shared Library
        uses: actions/upload-artifact@v4
        with:
          name: NanoURLNative-${{ matrix.os }}
          path: |
            ${{ env.BIN_OUTPUT }}/libNanoURLNative.dylib
            ${{ env.BIN_OUTPUT }}/libNanoURLNative.so
            ${{ env.BIN_OUTPUT }}/Release/NanoURLNative.dll
            ${{ env.BIN_OUTPUT }}/Release/NanoURLNative.lib
          if-no-files-found: ignore